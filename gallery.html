<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Artist Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="gallery-header">
        <h1 class="artist-name">JAMES ANNABLE</h1>
    </header>

    <nav class="main-nav">
        <div class="nav-container">
            <a href="gallery.html" class="nav-link active">Gallery</a>
            <a href="about.html" class="nav-link">About</a>
        </div>
    </nav>

    <main class="gallery-container">
        <div class="gallery-grid" id="gallery">
            <!-- Gallery items will be generated by JavaScript -->
        </div>
    </main>
    <div class="gallery-floor"></div>
    <div class="gallery-scrollbar-track">
        <div class="gallery-scrollbar-inner"></div>
    </div>

    <!-- Lightbox for full-size images -->
    <div id="lightbox" class="lightbox hidden">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <div class="lightbox-content">
            <img id="lightbox-image" src="" alt="">
            <div class="lightbox-info">
                <h2 id="lightbox-title"></h2>
                <p id="lightbox-medium"></p>
                <p id="lightbox-dimensions"></p>
                <p id="lightbox-year"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
